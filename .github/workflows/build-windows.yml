name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --name ContainerChecker --exclude-module matplotlib --add-data "rules.json;." gui.py

      - name: List dist folder
        run: dir dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ContainerChecker-Windows
          path: dist/*
